services:
  postgres:
    image: postgres:15-alpine
    container_name: ecocode-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ecocode}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    container_name: ecocode-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ecocode
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: ecocode-frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  pgdata: {}
